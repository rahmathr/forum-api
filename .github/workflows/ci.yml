name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: forum_user
          POSTGRES_PASSWORD: developer
          POSTGRES_DB: forum_api_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4  # Updated to v4

      - name: Setup Node.js
        uses: actions/setup-node@v4  # Updated to v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci  # Lebih konsisten daripada npm install

      - name: Verify DB connection
        run: |
          echo "Testing DB connection..."
          psql -h localhost -U forum_user -d forum_api_test -c "SELECT 'DB Connected!' as status;"
        env:
          PGPASSWORD: developer

      - name: Run migrations
        run: npm run migrate
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: forum_api_test
          PGUSER: forum_user
          PGPASSWORD: developer

      - name: Verify tables exist
        run: |
          echo "Checking tables..."
          psql -h localhost -U forum_user -d forum_api_test -c "\dt"
        env:
          PGPASSWORD: developer

      - name: Run tests
        run: npm test
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: forum_api_test
          PGUSER: forum_user
          PGPASSWORD: developer
          ACCESS_TOKEN_KEY: anyrandomstringfortest1234567890abcdef
          REFRESH_TOKEN_KEY: anyrandomstringfortest9876543210fedcba
          ACCESS_TOKEN_AGE: 1800
