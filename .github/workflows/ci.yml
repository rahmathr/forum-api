name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: forum_user
          POSTGRES_PASSWORD: developer
          POSTGRES_DB: forum_api_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run migration
        run: npm run migrate up
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: forum_api_test
          PGUSER: forum_user
          PGPASSWORD: developer

      - name: Run tests
        run: npm test
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: forum_api_test
          PGUSER: forum_user
          PGPASSWORD: developer
          ACCESS_TOKEN_KEY: anyrandomstringfortest1234567890abcdef
          REFRESH_TOKEN_KEY: aanyrandomstringfortest9876543210fedcba
          ACCESS_TOKEN_AGE: 1800
