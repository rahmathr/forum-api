limit_req_zone $binary_remote_addr zone=threads_zone:10m rate=90r/m;

server {
    listen 80;
    server_name forumapi.ddns.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name forumapi.ddns.net;

    ssl_certificate /etc/letsencrypt/live/forumapi.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forumapi.ddns.net/privkey.pem;

    location ~ ^/threads {
        limit_req zone=threads_zone nodelay;
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
